<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>lindsvg</title>
  <style>
    .demos {
      display: flex;
      inset: 0;
      position: fixed;

      svg {
        flex: 1 1 0;
        height: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="demos"></div>
  <script type="module">
    import {getSVGCode, getComboSVGCode} from "../dist/lindsvg.mjs";
    import * as testData from "./test-data.mjs";
    import {dump} from "https://unpkg.com/js-yaml@4.1.1/dist/js-yaml.mjs";

    let verifyChecksum = async (content, checksum) => {
      let contentUint8 = new TextEncoder().encode(content);
      let hashBuffer = await window.crypto.subtle.digest("SHA-256", contentUint8);
      let hashHex = new Uint8Array(hashBuffer).toHex();
      console.assert(hashHex === checksum);
    };

    let demos = document.body.querySelector(".demos");

    let singlePathSVGCode = getSVGCode(testData.singlePathData.lsParams, testData.singlePathData.svgParams);
    verifyChecksum(singlePathSVGCode, testData.singlePathData.checksum);
    demos.insertAdjacentHTML("beforeend", singlePathSVGCode);

    let multiPathSVGCode = getSVGCode(testData.multiPathData.lsParams, testData.multiPathData.svgParams);
    verifyChecksum(multiPathSVGCode, testData.multiPathData.checksum);
    demos.insertAdjacentHTML("beforeend", multiPathSVGCode);

    let comboSVGCode = getComboSVGCode(testData.comboData.lsParamsMap, testData.comboData.svgParams);
    verifyChecksum(comboSVGCode, testData.comboData.checksum);
    demos.insertAdjacentHTML("beforeend", comboSVGCode);

    try {
      console.log("Below, an exception is expected");
      console.log(getSVGCode(testData.invalidData.lsParams, testData.multiPathData.svgParams));
    } catch (error) {
      // Log the original message
      console.error(error);
      if (error.name === "LSError") {
        // Get a JSON representation of the error list and format it as YAML
        let errorJSON = error.toJSON();
        console.log(dump(errorJSON, {indent: 4}));
      }
    }
  </script>
</body>
</html>
