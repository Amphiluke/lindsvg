<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>lindsvg</title>
  <style>
    .demos {
      display: flex;
      inset: 0;
      position: fixed;

      svg {
        flex: 1 1 0;
        height: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="demos"></div>
  <script type="module">
    import * as params from "./params.mjs";
    import {getSVGCode, getMultiPathSVGCode, getComboSVGCode} from "../dist/lindsvg.mjs";
    import {dump} from "https://unpkg.com/js-yaml@4.1.1/dist/js-yaml.mjs";
    let demos = document.body.querySelector(".demos");
    demos.insertAdjacentHTML("beforeend", getSVGCode(params.singlePathLSParams, params.singlePathSVGParams));
    demos.insertAdjacentHTML("beforeend", getMultiPathSVGCode(params.multiPathLSParams, params.multiPathSVGParams));
    demos.insertAdjacentHTML("beforeend", getComboSVGCode(params.comboLSParams, params.comboSVGParams));

    try {
      console.log("Below, an exception is expected");
      console.log(getMultiPathSVGCode(params.lsInvalidParams, params.multiPathSVGParams));
    } catch (error) {
      // Log the original message
      console.error(error);
      if (error.name === "LSError") {
        // Get a JSON representation of the error list and format it as YAML
        let errorJSON = error.toJSON();
        console.log(dump(errorJSON, {indent: 4}));
      }
    }
  </script>
</body>
</html>
